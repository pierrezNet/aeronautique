    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --primary: #0284c7;
            --accent: #f59e0b;
            --border: #e2e8f0;
        }

        [data-theme='dark'] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --primary: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .content-wrapper {
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .description {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .watch-container {
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.2));
        }


        .license {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: auto;
            padding: 20px;
        }

        .license a { color: var(--primary); text-decoration: none; }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 100;
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" id="themeToggle">🌓</button>

    <div class="content-wrapper">
        <h1>Horloge UTC</h1>
        
        <div class="description">
            <p>Cette horloge est réglée à l'heure UTC (Greenwich Mean Time). Elle utilise les capteurs de mouvements et de lumière de votre appareil pour une expérience immersive.</p>
        </div>

        <div class="watch-container" id="watch">
            <object id="utc-clock" type="image/svg+xml" data="./watch.svg">Montre UTC</object>
        </div>

        <div class="license">
            <a rel="cc:license" href="https://creativecommons.org/licenses/by/4.0/">
                <img alt="Licence Creative Commons" src="https://i.creativecommons.org/l/by/4.0/80x15.png" style="border:0; margin-bottom:10px;">
            </a><br>
            <span property="dc:title">Montre UTC</span> de <a href="https://pierrez.net" property="cc:attributionName">Emmanuel Pierrez</a> pour <a href="https://aeronautique.xyz/">aeronautique.xyz</a><br>
            Licence Creative Commons Attribution 4.0 International.
        </div>
    </div>

    <script>
        const btn = document.getElementById('themeToggle');
        const body = document.body;
        const watch = document.getElementById('watch');

        // --- GESTION DU THÈME ---
        btn.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            setTheme(isDark ? 'light' : 'dark');
        });

        function setTheme(theme) {
            body.setAttribute('data-theme', theme);
            btn.innerHTML = theme === 'dark' ? '☀️' : '🌓';
        }

        // --- GYROSCOPE (Mouvement) ---
        window.addEventListener('deviceorientation', (event) => {
            const x = event.beta;  // inclinaison avant/arrière
            const y = event.gamma; // inclinaison gauche/droite
            
            if (x !== null && y !== null) {
                const moveX = Math.max(Math.min(y / 2, 15), -15);
                const moveY = Math.max(Math.min(x / 2, 15), -15);
                watch.style.transform = `perspective(1000px) rotateY(${moveX}deg) rotateX(${-moveY}deg)`;
            }
        });

        // --- CAPTEUR DE LUMINOSITÉ (Ambient Light) ---
        // Note: Cette API est très restreinte pour des raisons de sécurité.
        if ('AmbientLightSensor' in window) {
            try {
                const sensor = new AmbientLightSensor();
                sensor.addEventListener('reading', () => {
                    if (sensor.lux < 10) {
                        setTheme('dark');
                    } else {
                        setTheme('light');
                    }
                });
                sensor.start();
            } catch (err) {
                console.log("Capteur de lumière non accessible.");
            }
        }
    </script>
</body>
