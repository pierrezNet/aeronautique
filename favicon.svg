<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  <!-- Cadre extérieur -->
  <circle cx="32" cy="32" r="31" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <!-- Ciel et terre découpés dans le cercle -->
  <g clip-path="url(#c)">
    <rect x="0" y="0" width="64" height="34" fill="#4a90d9"/>
    <rect x="0" y="34" width="64" height="30" fill="#8b5e3c"/>
  </g>
  <!-- Ligne d'horizon -->
  <line x1="4" y1="34" x2="60" y2="34" stroke="white" stroke-width="2"/>
  <!-- Repères de tangage -->
  <line x1="20" y1="27" x2="44" y2="27" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="41" x2="44" y2="41" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Maquette avion (symbole central) -->
  <line x1="10" y1="34" x2="24" y2="34" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="54" y2="34" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="34" r="3" fill="none" stroke="#f59e0b" stroke-width="2"/>
</svg>
